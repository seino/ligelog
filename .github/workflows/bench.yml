name: Benchmark

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  bench:
    name: Run Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run benchmark
        run: node --expose-gc bench/index.js
        env:
          BENCH_ITERATIONS: 200000
          BENCH_WARMUP: 20000
